<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Lancaster Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none" role="alert">
        <div class="flex items-center gap-3">
            <svg id="toastIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            </svg>
            <span id="toastMessage">Login successful!</span>
        </div>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        
        <div class="flex flex-col items-center mb-6 pb-4">
            <img src="photos/ltdc.png" alt="LTD Logo" class="w-48 mb-3">
            <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 text-sm">Please sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input id="emailInput" type="email" 
                       placeholder="Email Address" 
                       class="w-full px-4 py-3 border-2 border-amber-600/50 rounded-lg focus:outline-none focus:border-amber-600 transition-colors text-gray-700"
                       required>
            </div>

                    <div class="relative">
                        <label class="block text-sm font-semibold text-gray-700 mb-1" for="passwordInput">Password</label>
                        <div class="relative">
                            <input id="passwordInput" type="password" 
                                placeholder="Password" 
                                class="w-full px-4 py-3 border-2 border-amber-600/50 rounded-lg focus:outline-none focus:border-amber-600 transition-colors text-gray-700 pr-12"
                                required>
                            
                            <button id="togglePassword" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" aria-label="Toggle password visibility">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                </svg>
                            </button>
                        </div>
                    </div>



            <button type="submit" 
                    class="w-full bg-[#600000] text-white font-bold py-3 rounded-lg hover:bg-[#4a0000] transition-colors shadow-md uppercase tracking-wider">
                Login
            </button>
        </form>



        <div class="mt-8 pt-6 border-t border-gray-100 text-center text-[10px] text-gray-500 space-y-2">
            <div class="space-x-2">
                <a href="#" class="hover:underline text-gray-600">Terms of Service</a>
                <span>|</span>
                <a href="#" class="hover:underline text-gray-600">Privacy Policy</a>
            </div>
            <p>© 2000 Lancaster Technology and Development</p>
        </div>

    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
